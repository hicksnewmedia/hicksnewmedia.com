# ════════════════════════════════════════════════════════════════════════
# Netlify configuration for hicksnewmedia.com
# https://docs.netlify.com/configure-builds/file-based-configuration/
#
# Three subdomains served from one Netlify site:
#   hicksnewmedia.com           → /index.html          (main site)
#   mediakit.hicksnewmedia.com  → /mediakit/index.html (browser media kit)
#   links.hicksnewmedia.com     → /links/index.html    (link hub)
#
# Subdomain pages reference shared assets at /assets/*, which serve
# from the same site root for every subdomain.
#
# Also serves the Ask James AI chatbot as a Netlify Function at
#   /.netlify/functions/ask-james
# ════════════════════════════════════════════════════════════════════════

[build]
  publish = "."
  # Functions live in netlify/functions/ for the Ask James chatbot
  functions = "netlify/functions"

[functions]
  # Faster bundling for the ask-james function
  node_bundler = "esbuild"

# ────────── Subdomain routing ──────────
# Only rewrite the root path "/" for each subdomain. All other paths
# (like /assets/foo.png) serve naturally, so the shared /assets/
# folder works across every subdomain without duplication.

[[redirects]]
  from = "/"
  to = "/mediakit/index.html"
  status = 200
  force = true
  conditions = {Host = ["mediakit.hicksnewmedia.com"]}

[[redirects]]
  from = "/"
  to = "/links/index.html"
  status = 200
  force = true
  conditions = {Host = ["links.hicksnewmedia.com"]}

# Pretty URL for /ask → /ask.html (Ask James chatbot dedicated page)
[[redirects]]
  from = "/ask"
  to = "/ask.html"
  status = 200

# ────────── Security headers (apply to all subdomains) ──────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "SAMEORIGIN"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "geolocation=(), microphone=(), camera=()"

# ────────── Caching ──────────
# Long cache for static assets (logos, favicons, PDF) — stable URLs
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for HTML so updates show up quickly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Never cache the chatbot function responses
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
