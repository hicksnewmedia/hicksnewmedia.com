<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" role="img" aria-label="HicksNewMedia horizontal lockup">
  <title>HicksNewMedia · Horizontal Lockup</title>
  <!-- Mark (left), scaled to match wordmark x-height -->
  <g transform="translate(20, 10)">
    <rect x="0" y="20" width="120" height="24" fill="#F5F1EB"/>
    <rect x="0" y="68" width="168" height="24" fill="#F48022"/>
    <rect x="0" y="116" width="120" height="24" fill="#F5F1EB"/>
    <rect x="144" y="116" width="24" height="24" fill="#F48022"/>
  </g>
  <!-- Divider rule -->
  <line x1="232" y1="20" x2="232" y2="160" stroke="#F5F1EB" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Wordmark using National Park (must be available via CSS for HTML embed; for standalone SVG, use Geist fallback) -->
  <text x="262" y="118" fill="#F5F1EB"
        font-family="'National Park', 'Geist', sans-serif"
        font-weight="800"
        font-size="76"
        letter-spacing="-1.2">Hicks<tspan fill="#F48022">New</tspan>Media<tspan fill="#F48022">.</tspan></text>
