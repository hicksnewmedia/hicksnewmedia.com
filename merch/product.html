  <script>
    (function () {
      var cfg = window.HNM_MERCH_CONFIG || {};
      var container = document.getElementById('product');

      // Parse slug from URL: /products/{slug} or /products/{slug}/anything
      var slug = (function () {
        var match = window.location.pathname.match(/\/products\/([^\/\?#]+)/);
        return match ? decodeURIComponent(match[1]) : null;
      })();

      if (!slug) {
        renderError('No product specified', 'The URL is missing a product slug. Head back to the merch page and pick something.');
        return;
      }

      if (!cfg.FOURTHWALL_TOKEN || cfg.FOURTHWALL_TOKEN.indexOf('YOUR_' + 'FOURTHWALL_TOKEN') !== -1) {
        renderError('Storefront not configured', 'Visit hnmmerch.store for now.');
        return;
      }

      loadProduct(slug);

      // ─── Load + render ──────────────────────────────────
      async function loadProduct(slug) {
        try {
          var url = 'https://storefront-api.fourthwall.com/v1/products/' + encodeURIComponent(slug)
            + '?storefront_token=' + encodeURIComponent(cfg.FOURTHWALL_TOKEN);
          var res = await fetch(url);
          if (!res.ok) {
            if (res.status === 404) {
              renderError('Product not found', 'This product might have been removed or renamed. Check the full store.');
            } else {
              throw new Error('HTTP ' + res.status);
            }
            return;
          }
          var product = await res.json();
          console.log('[product] schema:', product);
          renderProduct(product);
        } catch (err) {
          console.warn('[product] fetch failed:', err);
          renderError('Couldn\'t load this product', 'There was a problem reaching the storefront. Try the main store directly.');
        }
      }

      function renderProduct(p) {
        var name = p.name || p.title || 'Untitled';
        document.title = name + ' · HicksNewMedia Merch';

        var variants = p.variants || p.variantList || [];
        var images = collectImages(p);
        var description = p.description || p.body || p.bodyHtml || '';

        // Group variants by attribute (e.g., Size, Color) so we can render
        // a separate picker per attribute. Fall back to a single dropdown.
        var attrGroups = groupVariantsByAttribute(variants);

        var state = {
          variants: variants,
          selected: variants[0] || null,
          activeImage: 0,
          attrSelection: {}
        };

        // Initialize attribute selection from the first variant
        if (state.selected && Array.isArray(state.selected.attributes)) {
          state.selected.attributes.forEach(function (a) {
            state.attrSelection[a.name || a.key] = a.value;
          });
        }

        container.innerHTML = ''
          + '<div class="gallery">'
            + '<div class="gallery-main" id="main-img"></div>'
            + '<div class="gallery-thumbs" id="thumbs"></div>'
          + '</div>'
          + '<div class="info">'
            + '<div class="kicker">— HNM Merch</div>'
            + '<h1 class="product-name">' + escapeHtml(name) + '</h1>'
            + '<div class="product-price" id="price"></div>'
            + '<div id="variant-pickers"></div>'
            + '<button class="buy" id="buy-btn">'
              + '<span id="buy-label">Buy Now</span>'
              + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>'
            + '</button>'
            + '<div class="buy-note">Secure checkout on hnmmerch.store · Powered by Fourthwall</div>'
            + (description
              ? '<div class="description">'
                + '<div class="description-label">Details</div>'
                + cleanDescription(description)
                + '</div>'
              : '')
          + '</div>';

        renderGallery(images, state);
        renderVariantPickers(attrGroups, state);
        updatePrice(state);
        wireBuyButton(p, state);
      }

      // ─── Gallery ────────────────────────────────────────
      function collectImages(p) {
        var imgs = [];
        if (p.images && p.images.length) {
          p.images.forEach(function (i) {
            if (typeof i === 'string') imgs.push({ url: i });
            else if (i && (i.url || i.src)) imgs.push({ url: i.url || i.src, alt: i.alt });
          });
        }
        if (imgs.length === 0 && p.image && (p.image.url || p.image.src)) {
          imgs.push({ url: p.image.url || p.image.src });
        }
        return imgs;
      }

      function renderGallery(images, state) {
        var main = document.getElementById('main-img');
        var thumbs = document.getElementById('thumbs');
        if (images.length === 0) {
          main.style.display = 'none';
          thumbs.style.display = 'none';
          return;
        }
        renderMainImage(images, state);
        if (images.length > 1) {
          thumbs.innerHTML = images.map(function (img, i) {
            return '<div class="thumb' + (i === state.activeImage ? ' active' : '') + '" data-idx="' + i + '">'
              + '<img src="' + escapeAttr(img.url) + '" alt="" loading="lazy" />'
            + '</div>';
          }).join('');
          thumbs.addEventListener('click', function (e) {
            var thumb = e.target.closest('.thumb');
            if (!thumb) return;
            state.activeImage = parseInt(thumb.getAttribute('data-idx'), 10);
            renderMainImage(images, state);
            Array.prototype.forEach.call(thumbs.querySelectorAll('.thumb'), function (t, i) {
              t.classList.toggle('active', i === state.activeImage);
            });
          });
        } else {
          thumbs.style.display = 'none';
        }
      }

      function renderMainImage(images, state) {
        var img = images[state.activeImage];
        document.getElementById('main-img').innerHTML = '<img src="' + escapeAttr(img.url) + '" alt="" />';
      }

      // ─── Variants ───────────────────────────────────────
      function groupVariantsByAttribute(variants) {
        // Returns: { "Size": ["S","M","L"], "Color": ["Black","White"] }
        var groups = {};
        variants.forEach(function (v) {
          var attrs = normalizeAttributes(v);
          attrs.forEach(function (a) {
            if (!groups[a.name]) groups[a.name] = [];
            if (groups[a.name].indexOf(a.value) === -1) groups[a.name].push(a.value);
          });
        });
        return groups;
      }

      function normalizeAttributes(variant) {
        // Handles multiple possible Fourthwall variant attribute shapes
        var out = [];

        var processOne = function (name, val) {
          if (!name) return;
          // Skip Fourthwall's "Description" attribute — it's a combined
          // human-readable label like "Black, One size" that duplicates
          // info from the separate Color/Size attributes.
          if (String(name).toLowerCase() === 'description') return;

          // Extract the string value. Fourthwall sometimes nests structured
          // data here (e.g. { name: "Black", swatch: "#000000" }).
          if (val && typeof val === 'object') {
            val = val.name || val.value || val.label || val.title;
          }
          if (val == null || val === '') return;
          out.push({ name: String(name), value: String(val) });
        };

        if (Array.isArray(variant.attributes)) {
          variant.attributes.forEach(function (a) {
            processOne(a.name || a.key, a.value);
          });
        } else if (variant.attributes && typeof variant.attributes === 'object') {
          Object.keys(variant.attributes).forEach(function (k) {
            processOne(k, variant.attributes[k]);
          });
        }
        // Fallback: variant.name like "Medium / Black"
        if (out.length === 0 && variant.name) {
          out.push({ name: 'Option', value: String(variant.name) });
        }
        return out;
      }

      function renderVariantPickers(attrGroups, state) {
        var pickersEl = document.getElementById('variant-pickers');
        // Only show pickers for attributes with more than one option.
        // No point in a "Size" picker when there's only "One size".
        var attrNames = Object.keys(attrGroups).filter(function (name) {
          return attrGroups[name].length > 1;
        });
        if (attrNames.length === 0) {
          pickersEl.style.display = 'none';
          return;
        }

        pickersEl.innerHTML = attrNames.map(function (attrName) {
          return '<div class="variant-block">'
            + '<span class="variant-label">' + escapeHtml(attrName) + '</span>'
            + '<div class="variant-options" data-attr="' + escapeAttr(attrName) + '">'
              + attrGroups[attrName].map(function (val) {
                  var active = state.attrSelection[attrName] === val ? ' active' : '';
                  return '<button class="variant-opt' + active + '" data-val="' + escapeAttr(val) + '">' + escapeHtml(val) + '</button>';
                }).join('')
            + '</div>'
          + '</div>';
        }).join('');

        pickersEl.addEventListener('click', function (e) {
          var opt = e.target.closest('.variant-opt');
          if (!opt) return;
          var attrName = opt.parentElement.getAttribute('data-attr');
          var val = opt.getAttribute('data-val');
          state.attrSelection[attrName] = val;

          // Update active state in this attribute's group
          Array.prototype.forEach.call(opt.parentElement.querySelectorAll('.variant-opt'), function (o) {
            o.classList.toggle('active', o.getAttribute('data-val') === val);
          });

          // Find the matching variant
          state.selected = findMatchingVariant(state.variants, state.attrSelection);
          updatePrice(state);
        });
      }

      function findMatchingVariant(variants, selection) {
        return variants.find(function (v) {
          var attrs = normalizeAttributes(v);
          return Object.keys(selection).every(function (key) {
            return attrs.some(function (a) { return a.name === key && a.value === selection[key]; });
          });
        }) || variants[0];
      }

      function updatePrice(state) {
        var priceEl = document.getElementById('price');
        var buyBtn = document.getElementById('buy-btn');
        if (!state.selected) {
          priceEl.textContent = '';
          if (buyBtn) buyBtn.disabled = true;
          return;
        }
        priceEl.textContent = formatVariantPrice(state.selected);
        if (buyBtn) buyBtn.disabled = false;
      }

      function formatVariantPrice(v) {
        var fmt = function (val, ccy) {
          if (typeof val !== 'number') val = parseFloat(val);
          if (isNaN(val)) return '';
          var sym = ccy === 'USD' ? '$' : (ccy === 'EUR' ? '€' : (ccy === 'GBP' ? '£' : ''));
          return sym ? sym + val.toFixed(2) : val.toFixed(2) + ' ' + (ccy || '');
        };
        if (v.unitPrice && v.unitPrice.value !== undefined) return fmt(v.unitPrice.value, v.unitPrice.currency);
        if (v.price && v.price.value !== undefined) return fmt(v.price.value, v.price.currency);
        if (typeof v.price === 'number') return fmt(v.price, v.currency || 'USD');
        return '';
      }

      // ─── Buy button ─────────────────────────────────────
      function wireBuyButton(product, state) {
        var btn = document.getElementById('buy-btn');
        var label = document.getElementById('buy-label');
        var domain = cfg.CHECKOUT_DOMAIN || 'hnmmerch.store';
        var slug = product.slug || product.handle || '';

        btn.addEventListener('click', async function () {
          if (!state.selected) return;
          btn.disabled = true;
          label.textContent = 'Opening checkout…';

          // Try the Fourthwall cart API: create cart with this variant,
          // then send the customer straight to checkout with item loaded.
          try {
            var variantId = state.selected.id || state.selected.variantId;
            if (!variantId) throw new Error('No variant id');

            var res = await fetch('https://storefront-api.fourthwall.com/v1/carts'
              + '?storefront_token=' + encodeURIComponent(cfg.FOURTHWALL_TOKEN), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ items: [{ variantId: variantId, quantity: 1 }] })
            });

            if (res.ok) {
              var cart = await res.json();
              var cartId = cart.id || cart.cartId;
              // Fourthwall hosted checkout accepts cart hand-off via the cart id.
              // If this URL pattern doesn't work, the fallback below kicks in.
              window.location.href = 'https://' + domain + '/checkout?cartCurrency=USD&cartId=' + encodeURIComponent(cartId);
              return;
            }
          } catch (err) {
            console.warn('[buy] cart api fell through, using product link:', err);
          }

          // Fallback: open the Fourthwall product page in a new tab.
          // Customer picks variant again there, but it always works.
          window.open('https://' + domain + '/products/' + encodeURIComponent(slug), '_blank', 'noopener');
          btn.disabled = false;
          label.textContent = 'Buy Now';
        });
      }

      // ─── Description sanitization ───────────────────────
      function cleanDescription(html) {
        // Strip script/style tags but keep basic HTML formatting
        var clean = String(html)
          .replace(/<script[\s\S]*?<\/script>/gi, '')
          .replace(/<style[\s\S]*?<\/style>/gi, '')
          .replace(/\son\w+\s*=\s*"[^"]*"/gi, '')
          .replace(/\son\w+\s*=\s*'[^']*'/gi, '');
        // If it has no HTML, wrap it
        if (clean.indexOf('<') === -1) {
          return '<p>' + escapeHtml(clean).replace(/\n+/g, '</p><p>') + '</p>';
        }
        return clean;
      }

      // ─── Error state ────────────────────────────────────
      function renderError(title, body) {
        container.innerHTML = '<div class="error-state" style="grid-column: 1 / -1;">'
          + '<div class="error-title">' + escapeHtml(title) + '</div>'
          + '<div class="error-body">' + escapeHtml(body) + '</div>'
          + '<a class="error-cta" href="/">Browse all merch →</a>'
          + '</div>';
      }

      // ─── Helpers ────────────────────────────────────────
      function escapeHtml(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
      function escapeAttr(str) { return escapeHtml(str); }
    })();
  </script>

  <script src="/hnm-live-banner.js" defer></script>
</body>
